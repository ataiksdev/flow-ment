kind = "web"
previewPath = "/"
title = "Flōw — Time & Habit Tracker"
version = "1.0.0"
id = "artifacts/flow-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23315

[services.development]
run = "pnpm --filter @workspace/flow-pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flow-pwa", "run", "build" ]
publicDir = "artifacts/flow-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23315"
BASE_PATH = "/"
